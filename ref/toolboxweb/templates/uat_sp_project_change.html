                    <div id="vehicleVinError" class="error" style="font-size: 0.9em;"></div>
                </div>
                <div class="input-group">
                    <label for="project">切换目标项目 (项目版本号)</label>
                    <select id="project" onchange="applyRules()" required>

                    </select>
                </div>
                <div class="input-group">
                    <label for="carSoftwareVersion">车机软件版本号</label>
                    <input type="text" id="carSoftwareVersion" placeholder="请输入车机软件版本号" oninput="applyRules()" required>
                    <div id="carSoftwareVersionHint" class="info" style="font-size: 0.9em; margin-top: 5px; color: #6c757d; border-top: none; padding-top: 0;">请先选择目标项目。</div>
                    <div id="carSoftwareVersionError" class="error" style="font-size: 0.9em;"></div>
                </div>
                <div class="input-group">
                    <label for="applicationDepartment">申请部门</label>
                    <input type="text" id="applicationDepartment" placeholder="请输入申请部门" required>
                </div>
            </div>

            <div class="buttons">
                <button class="action-btn" onclick="submitSwitch()">开始切换项目</button>
                <button class="clear-btn" onclick="clearForm()">清空表单</button>
            </div>
            
            <div class="info output-area" id="statusMessage">

            </div>
            <div class="output-area" id="apiResponse">

            </div>
        </div>
    </div>

            {"项目版本号": "MOS_C_SUV", "OCU类型": "CDCU", "品牌": "VW", "车机类型": "CDCU", "燃油类型": "BEV", "车机软件版本号": ["A123"], "PRNR": "~28AY~27UT~2EL8", "发电机号": "DKX575213", "运营商": "CTCC", "产线平台": "ADP", "HU零件号": "空", "OCU零件号": "空" },
        ];

        // 页面初始化
        document.addEventListener('DOMContentLoaded', () => {
            populateProjectDropdown();
            applyRules(); // 页面加载时执行一次，以初始化提示
        });

        // 填充“切换目标项目”下拉选择框
        function populateProjectDropdown() {
            const projectSelect = document.getElementById('project');
            const projectNames = [...new Set(rules.map(rule => rule['项目版本号']))].sort();
            projectNames.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                projectSelect.appendChild(option);
            });
        }

        // 根据规则验证车机软件版本号，并提供提示
        function applyRules() {
            const selectedProject = document.getElementById('project').value;
            const carSoftwareVersionInput = document.getElementById('carSoftwareVersion').value.toUpperCase().trim();
            const errorElement = document.getElementById('carSoftwareVersionError');
            const hintElement = document.getElementById('carSoftwareVersionHint');

            errorElement.textContent = ''; // 清除车机软件版本号错误信息
            hintElement.textContent = ''; // 清除旧的提示
            
            // 清除其他校验的错误信息
            document.getElementById('vehicleVinError').textContent = '';

            // --- 更新车机软件版本号提示 ---
            if (!selectedProject) {
                hintElement.textContent = '请选择目标项目以获取推荐的车机软件版本号格式。';
                document.getElementById('statusMessage').className = 'info output-area';
                document.getElementById('statusMessage').textContent = '提示：请输入VIN，选择目标项目，并输入车机软件版本号，然后提交。';
                return; // 如果没有选择项目，则不进行后续的规则匹配
            }

            const projectRulesForHint = rules.filter(rule => rule['项目版本号'] === selectedProject);
            let possibleVersions = new Set();
            projectRulesForHint.forEach(rule => {
                rule['车机软件版本号'].forEach(versionPattern => {
                    possibleVersions.add(versionPattern);
                });
            });

            const sortedVersions = Array.from(possibleVersions).sort();
            if (sortedVersions.length > 0) {
                hintElement.textContent = `推荐格式: ${sortedVersions.join(', ')}。 (XX表示0-9或A-Z的任意字符)`;
                hintElement.style.color = '#6c757d'; // 正常提示颜色
            } else {
                hintElement.textContent = '当前项目版本号没有可用的车机软件版本号规则。';
                hintElement.style.color = '#e74c3c'; // 警告颜色
            }
            // --- 提示更新结束 ---

            // 如果已经输入车机软件版本号，进行规则匹配校验
            if (carSoftwareVersionInput) {
                const matchingRules = rules.filter(rule => {
                    const projectMatches = rule['项目版本号'] === selectedProject;
                    const swVersionMatches = rule['车机软件版本号'].some(pattern => {
                        const regexPattern = new RegExp('^' + pattern.replace(/X/g, '[0-9A-Z]') + '$', 'i'); 
                        return regexPattern.test(carSoftwareVersionInput);
                    });
                    return projectMatches && swVersionMatches;
                });

                if (matchingRules.length === 0) {
                    errorElement.textContent = '当前输入的车机软件版本号没有找到匹配的规则。';
                    errorElement.className = 'error';
                    document.getElementById('statusMessage').className = 'error output-area';
                    document.getElementById('statusMessage').textContent = '错误：车机软件版本号与所选项目不匹配！';
                } else if (matchingRules.length > 1) {
                    errorElement.textContent = `警告：找到 ${matchingRules.length} 条匹配规则，版本号可能过于宽泛。`;
                    errorElement.className = 'warning-text'; // 可以定义一个警告样式
                    document.getElementById('statusMessage').className = 'info output-area';
                    document.getElementById('statusMessage').textContent = '提示：车机软件版本号匹配到多条规则，请确认。';
                } else {
                    errorElement.textContent = ''; // 匹配成功，清除错误
                    document.getElementById('statusMessage').className = 'info output-area';
                    document.getElementById('statusMessage').textContent = '提示：车机软件版本号已匹配成功。';
                }
            }
        }

        // 清空表单
        function clearForm() {
            document.getElementById('vehicleVin').value = '';
            document.getElementById('project').value = '';
            document.getElementById('carSoftwareVersion').value = '';
            document.getElementById('applicationDepartment').value = '';

            // 清空所有错误和提示信息
            document.getElementById('vehicleVinError').textContent = '';
            document.getElementById('carSoftwareVersionError').textContent = '';
            document.getElementById('carSoftwareVersionHint').textContent = '请先选择目标项目。';
            document.getElementById('carSoftwareVersionHint').style.color = '#6c757d';
            
            document.getElementById('statusMessage').className = 'info output-area';
            document.getElementById('statusMessage').textContent = '提示：请输入VIN，选择目标项目，并输入车机软件版本号。';

            document.getElementById('apiResponse').innerHTML = '';
            document.getElementById('responseDisplay').style.display = 'none';
            document.getElementById('switchResultTitle').textContent = 'UAT SP项目切换结果'; // 重置标题
        }

        // 提交数据
        async function submitSwitch() {
            // 清除之前的错误信息
            document.getElementById('vehicleVinError').textContent = '';
            document.getElementById('carSoftwareVersionError').textContent = '';
            document.getElementById('statusMessage').className = 'info output-area';
            document.getElementById('statusMessage').textContent = '';

            const vehicleVin = document.getElementById('vehicleVin').value.trim();
            const project = document.getElementById('project').value;
            const carSoftwareVersionInput = document.getElementById('carSoftwareVersion').value.trim();
            const applicationDepartment = document.getElementById('applicationDepartment').value.trim();
            
            // 客户端验证
            let hasError = false;
            let errorMessages = [];

            if (!vehicleVin) {
                document.getElementById('vehicleVinError').textContent = '车辆VIN码为必填项！';
                errorMessages.push('车辆VIN码为必填项！');
                hasError = true;
            } else if (vehicleVin.length !== 17) {
                document.getElementById('vehicleVinError').textContent = '车辆VIN码必须为17位！';
                errorMessages.push('车辆VIN码必须为17位！');
                hasError = true;
            }
            if (!project) {
                errorMessages.push('切换目标项目未选择！');
                hasError = true;
            }
            // 检查车机软件版本号是否通过规则验证
            if (!carSoftwareVersionInput) {
                document.getElementById('carSoftwareVersionError').textContent = '车机软件版本号为必填项！';
                errorMessages.push('车机软件版本号为必填项！');
                hasError = true;
            } else if (document.getElementById('carSoftwareVersionError').textContent) {
                // 如果 applyRules 已经设置了错误信息，这里也算作错误
                errorMessages.push('车机软件版本号格式不正确或未匹配到规则！');
                hasError = true;
            }
            if (!applicationDepartment) {
                errorMessages.push('申请部门为必填项！');
                hasError = true;
            }

            if (hasError) {
                document.getElementById('statusMessage').style.display = 'block'; 
                document.getElementById('statusMessage').className = 'error output-area';
                document.getElementById('statusMessage').textContent = '错误：' + errorMessages.join(' ');
                return;
            }

            // 要发送到后端的数据
            const data = {
                "车辆VIN码": vehicleVin,
                "目标项目版本号": project,
                "车机软件版本号": carSoftwareVersionInput,
                "申请部门": applicationDepartment
                // 其他字段将由后端根据这些信息和业务逻辑生成/填充
            };

            const jsonString = JSON.stringify(data, null, 2);
            const apiResponseDiv = document.getElementById('apiResponse');
            
            apiResponseDiv.innerHTML = `<pre>${jsonString}</pre>`; // 先显示即将发送的数据
            document.getElementById('responseDisplay').style.display = 'block';

            document.getElementById('statusMessage').className = 'info output-area';
            document.getElementById('statusMessage').textContent = `数据已准备好，正在尝试切换车辆项目...`;
            
            try {
                const response = await fetch(backendApiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: jsonString,
                });

                const result = await response.json();
                
                apiResponseDiv.innerHTML = `<pre>${JSON.stringify(result, null, 2)}</pre>`; // 显示后端返回的原始JSON

                if (response.ok) {
                    document.getElementById('statusMessage').className = 'success output-area';
                    document.getElementById('statusMessage').textContent = '车辆项目切换请求成功！请查看下方结果。';
                } else {
                    document.getElementById('statusMessage').className = 'error output-area';
                    document.getElementById('statusMessage').textContent = `车辆项目切换请求失败：${result.message || response.statusText}`;
                }
            } catch (error) {
                console.error('请求出错:', error);
                document.getElementById('statusMessage').className = 'error output-area';
                document.getElementById('statusMessage').textContent = `请求发生错误: ${error.message}`;
                apiResponseDiv.innerHTML = `<span class="error">请求错误: ${error.message}</span>`;
            }
        }
    </script>
</body>
